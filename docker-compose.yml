# TaaS Platform — Local development stack
# Starts the three Python processes only.
# All cloud services (Aiven Kafka, Neon, Gemini) remain remote.
#
# Usage:
#   docker compose up --build       # first run
#   docker compose up               # subsequent runs
#   docker compose down             # stop all
#
# Prerequisites:
#   - .env file with all secrets populated
#   - certs/ directory with ca.pem, service.cert, service.key

version: "3.9"

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile.backend
  env_file: .env
  volumes:
    - ./certs:/app/certs:ro
  restart: unless-stopped
  networks:
    - taas

services:
  api:
    <<: *common
    container_name: taas-api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  cep-engine:
    <<: *common
    container_name: taas-cep-engine
    command: python -m backend.src.streaming.quix_cep_engine
    depends_on:
      api:
        condition: service_healthy

  producer:
    <<: *common
    container_name: taas-producer
    command: python simulation/hospital_producer.py
    depends_on:
      api:
        condition: service_healthy

networks:
  taas:
    driver: bridge